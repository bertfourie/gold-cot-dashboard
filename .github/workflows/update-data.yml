name: Update COT data

# Runs every Saturday at 02:00 UTC (≈ 12:00 noon AEST Saturday).
# CFTC publishes Friday ~3:30pm ET, so Saturday morning UTC is safely after.
# Also exposes a manual "Run workflow" button in the Actions tab.
on:
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write   # needed so the action can commit updated JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m scripts.update_data

      - name: Commit updated data
        run: |
          git config user.name  "cot-bot"
          git config user.email "cot-bot@users.noreply.github.com"
          git add gold_cot_data.json silver_cot_data.json gld_data.json ratio_data.json
          # only commit if something changed
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            DATESTAMP=$(date -u +"%Y-%m-%d")
            git commit -m "Auto-update COT/ETF data ($DATESTAMP)"
            git push
          fi
